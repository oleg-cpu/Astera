{% extends 'base.html' %}

{% block title %}Delete Task{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger shadow">
            <div class="card-header bg-danger text-white">
                <h3 class="mb-0">⚠️ Confirmation</h3>
            </div>
            <div class="card-body">
                <p class="lead">Are you sure you want to delete the task:</p>
                <h4 class="text-danger mb-4">"{{ object.title }}"?</h4>

                <form method="POST">
                    {% csrf_token %}
                    <div class="d-flex justify-content-between">
                        <button type="submit" class="btn btn-danger btn-lg">
                            Yes, Delete
                        </button>
                        <a href="{% url 'task-list' %}" class="btn btn-secondary">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
