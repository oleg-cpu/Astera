---
- name: Configure EC2 Instance and Deploy Django App
  hosts: app_servers
  gather_facts: yes

  tasks:
    - name: Load secret variables securely (Initial)
      ansible.builtin.include_vars:
        file: secret_vars.yml

    - name: Update apt repo and cache
      ansible.builtin.apt:
        update_cache: yes
        force_apt_get: yes
      become: yes

    - name: Install required system packages
      ansible.builtin.apt:
        pkg:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
          - gnupg
        state: present
      become: yes

    - name: Add Docker GPG apt Key
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present
      become: yes

    - name: Add Docker Repository
      ansible.builtin.apt_repository:
        repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu noble stable
        state: present
      become: yes

    - name: Install Docker CE
      ansible.builtin.apt:
        name: docker-ce
        state: latest
        update_cache: yes
      become: yes

    - name: Install Docker Compose (Plugin)
      ansible.builtin.apt:
        name: docker-compose-plugin
        state: latest
      become: yes

    - name: Ensure docker service is running and enabled
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: yes
      become: yes

    - name: Add 'ubuntu' user to 'docker' group
      ansible.builtin.user:
        name: ubuntu
        groups: docker
        append: yes
      become: yes

    - name: Reset ssh connection to apply user groups
      ansible.builtin.meta: reset_connection

    - name: Reload secret variables for the new session
      ansible.builtin.include_vars:
        file: secret_vars.yml

    - name: Log in to GitHub Container Registry
      community.docker.docker_login:
        registry: ghcr.io
        username: "{{ github_username }}"
        password: "{{ github_token }}"

    - name: Create project directory on server
      ansible.builtin.file:
        path: /home/ubuntu/astera-app
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Create .env file for Django
      ansible.builtin.template:
        src: templates/.env.j2
        dest: /home/ubuntu/astera-app/.env
        owner: ubuntu
        group: ubuntu
        mode: '0600'

    - name: Copy Nginx configuration folder to server
      ansible.builtin.copy:
        src: ../nginx
        dest: /home/ubuntu/astera-app/
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Copy docker-compose.yml to server
      ansible.builtin.copy:
        src: ../docker-compose.yml
        dest: /home/ubuntu/astera-app/docker-compose.yml
        owner: ubuntu
        group: ubuntu
        mode: '0644'

    - name: Pull and Start Containers via Docker Compose
      community.docker.docker_compose_v2:
        project_src: /home/ubuntu/astera-app
        state: present
        pull: always
        recreate: always
        remove_orphans: yes
        env_files:
          - .env
    - name: Run Django Migrations
      community.docker.docker_container_exec:
          container: astera-backened
          command: python manage.py migrate
